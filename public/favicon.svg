<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <rect width="64" height="64" rx="12" fill="#0a0a1a"/>
  <!-- Brain/Neural node shape -->
  <circle cx="32" cy="32" r="14" fill="none" stroke="#1a6eff" stroke-width="2.5"/>
  <!-- Neural connections -->
  <circle cx="32" cy="20" r="3" fill="#1a6eff"/>
  <circle cx="44" cy="27" r="3" fill="#1a6eff"/>
  <circle cx="44" cy="37" r="3" fill="#1a6eff"/>
  <circle cx="32" cy="44" r="3" fill="#1a6eff"/>
  <circle cx="20" cy="37" r="3" fill="#1a6eff"/>
  <circle cx="20" cy="27" r="3" fill="#1a6eff"/>
  <!-- Center node -->
  <circle cx="32" cy="32" r="5" fill="#1a6eff"/>
  <!-- Lines connecting nodes to center -->
  <line x1="32" y1="20" x2="32" y2="27" stroke="#1a6eff" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="27" x2="37" y2="30" stroke="#1a6eff" stroke-width="1.5" opacity="0.7"/>
  <line x1="44" y1="37" x2="37" y2="34" stroke="#1a6eff" stroke-width="1.5" opacity="0.7"/>
  <line x1="32" y1="44" x2="32" y2="37" stroke="#1a6eff" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="37" x2="27" y2="34" stroke="#1a6eff" stroke-width="1.5" opacity="0.7"/>
  <line x1="20" y1="27" x2="27" y2="30" stroke="#1a6eff" stroke-width="1.5" opacity="0.7"/>
</svg>
